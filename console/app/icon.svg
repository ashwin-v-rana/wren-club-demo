<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Wren">
  <!-- Art Deco roundel -->
  <circle cx="60" cy="60" r="55" stroke="#b08d57" stroke-width="2"/>
  <circle cx="60" cy="60" r="48" stroke="#b08d57" stroke-width="0.8"/>
  <!-- Deco ticks at the cardinal points -->
  <g stroke="#b08d57" stroke-width="2" stroke-linecap="round">
    <line x1="60" y1="4" x2="60" y2="12"/>
    <line x1="60" y1="108" x2="60" y2="116"/>
    <line x1="4" y1="60" x2="12" y2="60"/>
    <line x1="108" y1="60" x2="116" y2="60"/>
  </g>
  <!-- Wren, facing left with a cocked tail -->
  <g>
    <!-- tail, jaunty and upturned -->
    <polygon points="67,64 75,67 92,36 83,34" fill="#b08d57"/>
    <line x1="80" y1="40" x2="72" y2="60" stroke="#8a6d3f" stroke-width="0.9"/>
    <line x1="86" y1="42" x2="78" y2="62" stroke="#8a6d3f" stroke-width="0.9"/>
    <!-- body -->
    <ellipse cx="60" cy="62" rx="17" ry="20" transform="rotate(-18 60 62)" fill="#b08d57"/>
    <!-- folded wing -->
    <ellipse cx="58" cy="65" rx="10" ry="14" transform="rotate(-18 58 65)" fill="#8a6d3f" fill-opacity="0.5"/>
    <!-- head -->
    <circle cx="47" cy="46" r="10" fill="#b08d57"/>
    <!-- beak -->
    <polygon points="39,44 39,50 29,47" fill="#8a6d3f"/>
    <!-- eye -->
    <circle cx="45" cy="44" r="1.8" fill="#1a3a32"/>
    <!-- legs -->
    <g stroke="#8a6d3f" stroke-width="1.6" stroke-linecap="round">
      <line x1="55" y1="80" x2="55" y2="86"/>
      <line x1="62" y1="80" x2="62" y2="86"/>
    </g>
  </g>
  <!-- perch -->
  <line x1="38" y1="87" x2="82" y2="87" stroke="#b08d57" stroke-width="2" stroke-linecap="round"/>
</svg>
